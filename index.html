<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FFFFFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>머니플로우 — 현장 손익 관리</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="style.css">
<script defer src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
#loading-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: #FFFFFF;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
}
.loading-logo { font-size: 28px; font-weight: 800; letter-spacing: -0.03em; color: #191F28; }
.loading-logo span { color: #2F6B47; }
.loading-spinner {
  width: 32px; height: 32px; border-radius: 50%;
  border: 3px solid #E5E8EB; border-top-color: #2F6B47;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#pull-indicator {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  display: flex; align-items: center; justify-content: center;
  height: 0; overflow: hidden; background: #2F6B47;
  transition: height .2s; color: #fff; font-size: 13px; font-weight: 700;
}
</style>
<link rel="icon" href="data:,">
</head>
<body>

<div id="loading-screen">
  <div class="loading-logo">디자인<span>포</span></div>
  <div class="loading-spinner"></div>
</div>
<div id="pull-indicator">↓ 새로고침</div>
  
<!-- Login screen (shown if not logged in) -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">머니<span>플로우</span></div>
      <div class="login-tag">인테리어 현장 손익 관리</div>
    </div>
    <form id="login-form" class="login-form">
      <div class="field">
        <label class="field-label">이름</label>
        <input class="input" id="login-name" placeholder="김실장" required autocomplete="name">
      </div>
      <div class="field">
        <label class="field-label">PIN <span style="color: var(--muted); font-weight: 400;">4자리</span></label>
        <input class="input" id="login-pin" type="password" inputmode="numeric" maxlength="4" placeholder="••••" required>
      </div>
      <div class="field">
        <label class="field-label">권한</label>
        <div class="role-pick">
          <label><input type="radio" name="login-role" value="boss"><span>👑 대표</span></label>
          <label><input type="radio" name="login-role" value="manager" checked><span>🧢 팀장</span></label>
          <label><input type="radio" name="login-role" value="staff"><span>👤 대리</span></label>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">로그인</button>
      <div class="login-demo-row">
        <button type="button" class="btn btn-ghost btn-sm" data-demo-role="boss">👑 대표 데모</button>
        <button type="button" class="btn btn-ghost btn-sm" data-demo-role="manager">🧢 팀장 데모</button>
        <button type="button" class="btn btn-ghost btn-sm" data-demo-role="staff">👤 대리 데모</button>
      </div>
      <p class="login-foot">처음이신가요? 이름·PIN·권한을 선택하면 자동으로 계정이 생성됩니다 (이 기기에만 저장).</p>
    </form>
  </div>
</div>

<!-- App shell -->
<div id="app"></div>

<!-- Modal container -->
<div id="modal-root"></div>

<!-- Bottom tab bar (5 tabs) -->
<nav class="tabbar" id="tabbar" style="display: none;">
  <button class="tabbar-item is-active" data-page="home">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10l7-7 7 7M5 9v8h10V9"/></svg>
    <span>홈</span>
  </button>
  <button class="tabbar-item" data-page="sites">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="3" width="6" height="6"/><rect x="11" y="3" width="6" height="6"/><rect x="3" y="11" width="6" height="6"/><rect x="11" y="11" width="6" height="6"/></svg>
    <span>현장</span>
  </button>
  <button class="tabbar-item" data-page="input">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="10" cy="4.8" rx="6" ry="2.3"/><path d="M4 4.8v3c0 1.27 2.69 2.3 6 2.3s6-1.03 6-2.3v-3"/><path d="M4 8.3v3c0 1.27 2.69 2.3 6 2.3s6-1.03 6-2.3v-3"/><path d="M4 11.8v3c0 1.27 2.69 2.3 6 2.3s6-1.03 6-2.3v-3"/></svg>
    <span>입력</span>
  </button>
  <button class="tabbar-item" data-page="calendar">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="4" width="14" height="13" rx="1"/><path d="M3 8h14M7 2v4M13 2v4"/></svg>
    <span>달력</span>
  </button>
  <button class="tabbar-item" data-page="settings">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="10" cy="10" r="2.5"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M4.2 15.8l1.4-1.4M14.4 5.6l1.4-1.4"/></svg>
    <span>설정</span>
  </button>
</nav>

<script defer src="data.js"></script>
<script defer src="auth.js"></script>
<script defer src="firebase.js"></script>
<script defer src="modals.js"></script>
<script defer src="pages.js"></script>
<script defer src="app.js"></script>
</body>
</html>
