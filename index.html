<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FAF7F1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>머니플로우 — 현장 손익 관리</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyC3ePaFaHhNKLiKBmkEuAGMmHc3aqOxUEM",
  authDomain:"design-for-money-flow.firebaseapp.com",
  databaseURL:"https://design-for-money-flow-default-rtdb.firebaseio.com",
  projectId:"design-for-money-flow",
  storageBucket:"design-for-money-flow.appspot.com",
  messagingSenderId:"567890123456",
  appId:"1:567890123456:web:abcdef1234567890"
});
</script>
</head>
<body>
<!-- Login screen -->
<div id="login-screen" class="login-screen" style="display: none;">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">머니<span>플로우</span></div>
      <div class="login-tag">인테리어 현장 손익 관리</div>
    </div>
    <form id="login-form" class="login-form">
      <div class="field">
        <label class="field-label">이름</label>
        <input class="input" id="login-name" placeholder="이름을 입력하세요" required autocomplete="name">
      </div>
      <div class="field">
        <label class="field-label">PIN <span style="color: var(--muted); font-weight: 400;">4자리</span></label>
        <input class="input" id="login-pin" type="password" inputmode="numeric" maxlength="4" placeholder="••••" required>
      </div>
      <p id="login-error" style="color: #c0392b; font-size: 12px; margin: 4px 0 8px; min-height: 16px; text-align: center;"></p>
      <button type="submit" class="btn btn-primary btn-block">로그인</button>
      <p class="login-foot">보스에게 계정을 받아 로그인하세요.</p>
    </form>
  </div>
</div>

<!-- App shell -->
<div id="app"></div>

<!-- Modal container -->
<div id="modal-root"></div>

<!-- Bottom tab bar: 홈 - 현장 - +(가운데 FAB) - 달력 - 설정 -->
<nav class="tabbar" id="tabbar" style="display: none;">
  <button class="tabbar-item is-active" data-page="home">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10l7-7 7 7M5 9v8h10V9"/></svg>
    <span>홈</span>
  </button>
  <button class="tabbar-item" data-page="sites">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="3" width="6" height="6"/><rect x="11" y="3" width="6" height="6"/><rect x="3" y="11" width="6" height="6"/><rect x="11" y="11" width="6" height="6"/></svg>
    <span>현장</span>
  </button>
  <button class="tabbar-fab" data-page="quickInput">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>
  <button class="tabbar-item" data-page="calendar">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="4" width="14" height="13" rx="1"/><path d="M3 8h14M7 2v4M13 2v4"/></svg>
    <span>달력</span>
  </button>
  <button class="tabbar-item" data-page="settings">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="10" cy="10" r="2.5"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M4.2 15.8l1.4-1.4M14.4 5.6l1.4-1.4"/></svg>
    <span>설정</span>
  </button>
</nav>

<script src="data.js"></script>
<script src="auth.js"></script>
<script src="modals.js"></script>
<script src="pages.js"></script>
<script src="app.js"></script>
</body>
</html>
